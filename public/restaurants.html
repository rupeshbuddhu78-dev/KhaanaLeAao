<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Restaurant Management | KhaanaAdmin</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* BASE STYLES */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { display: flex; background-color: #f4f6f9; }

        /* SIDEBAR DESIGN */
        .sidebar { width: 250px; height: 100vh; background-color: #2c3e50; color: white; position: fixed; }
        .sidebar h2 { text-align: center; padding: 20px 0; background-color: #e74c3c; letter-spacing: 1px; }
        .menu { list-style: none; padding-top: 20px; }
        .menu li { font-size: 16px; cursor: pointer; transition: 0.3s; border-left: 4px solid transparent; }
        .menu li a { text-decoration: none; color: white; display: block; padding: 15px 25px; }
        .menu li i { margin-right: 10px; width: 20px; }
        .menu li:hover, .menu li.active { background-color: #34495e; border-left: 4px solid #e74c3c; }

        /* MAIN CONTENT DESIGN */
        .main-content { margin-left: 250px; padding: 20px 40px; width: calc(100% - 250px); }
        header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; background: white; padding: 15px 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        header h1 { color: #333; font-size: 24px; }

        /* Actions */
        .header-actions { display: flex; gap: 15px; }
        .search-box { padding: 10px; border: 1px solid #ccc; border-radius: 5px; width: 250px; }
        .btn-primary, .btn-success, .btn-danger, .btn-warning, .btn-back { padding: 10px 15px; border: none; border-radius: 5px; cursor: pointer; color: white; font-weight: bold; display: flex; align-items: center; gap: 8px; }
        .btn-primary { background: #2980b9; }
        .btn-success { background: #27ae60; }
        .btn-danger { background: #c0392b; }
        .btn-warning { background: #f39c12; } 
        .btn-back { background: #7f8c8d; }

        /* Data Table */
        .table-container { background: white; border-radius: 8px; box-shadow: 0 4px 8px rgba(0,0,0,0.05); overflow-x: auto; }
        .data-table { width: 100%; border-collapse: collapse; }
        .data-table th, .data-table td { padding: 15px; text-align: left; border-bottom: 1px solid #eee; }
        .data-table th { background: #f8f9fa; color: #2c3e50; }

        /* Badges */
        .badge { padding: 5px 10px; border-radius: 12px; font-size: 12px; font-weight: bold; text-transform: uppercase; }
        .badge.active { background: #d5f5e3; color: #27ae60; }
        .badge.pending_verification { background: #fcf3cf; color: #f39c12; }
        .badge.incomplete { background: #e5e7e9; color: #7f8c8d; }
        .badge.suspended { background: #fadbd8; color: #c0392b; }
        .badge.docs-ok { background: #e8f8f5; color: #1abc9c; text-decoration: none; }

        .action-btn { padding: 6px 12px; border: none; border-radius: 4px; cursor: pointer; background: #ecf0f1; color: #2c3e50; }

        /* Inner Tabs */
        .inner-tabs { display: flex; border-bottom: 2px solid #ecf0f1; margin-bottom: 20px; }
        .tab-link { padding: 10px 20px; background: none; border: none; font-size: 16px; cursor: pointer; color: #7f8c8d; }
        .tab-link.active { color: #e74c3c; border-bottom: 3px solid #e74c3c; font-weight: bold; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        
        .doc-card { background: #f4f6f9; padding: 20px; border-radius: 6px; border: 1px solid #ddd; text-align: center; }
        .doc-card button { margin-top: 10px; padding: 10px 20px; cursor: pointer; background: #34495e; color: white; border: none; border-radius: 4px; }
    </style>
</head>
<body>

    <div class="sidebar">
        <h2>🍔 KhaanaAdmin</h2>
        <ul class="menu">
            <li><a href="index.html"><i class="fa-solid fa-house"></i> Dashboard</a></li>
            <li><a href="users.html"><i class="fa-solid fa-users"></i> Users</a></li>
            <li class="active"><a href="restaurants.html"><i class="fa-solid fa-utensils"></i> Restaurants</a></li>
            <li><a href="orders.html"><i class="fa-solid fa-box-open"></i> Orders</a></li>
            <li><a href="settings.html"><i class="fa-solid fa-gear"></i> Settings</a></li>
        </ul>
    </div>

    <div class="main-content">
        
        <div id="listView">
            <header>
                <h1>Restaurant Management</h1>
                <div class="header-actions">
                    <input type="text" id="searchRest" placeholder="Search restaurant..." class="search-box">
                    <button class="btn-primary" onclick="loadRestaurants()"><i class="fa-solid fa-rotate-right"></i> Refresh</button>
                </div>
            </header>

            <div class="table-container">
                <table class="data-table">
                    <thead>
                        <tr>
                            <th>Restaurant Details</th>
                            <th>Phone</th>
                            <th>Docs</th>
                            <th>Status</th>
                            <th>Action</th>
                        </tr>
                    </thead>
                    <tbody id="restaurantTableBody">
                        <tr><td colspan="5" style="text-align:center;">Loading Data...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>

        <div id="detailsView" style="display: none;">
            <header>
                <div>
                    <button class="btn-back" onclick="closeDetails()"><i class="fa-solid fa-arrow-left"></i> Back</button>
                    <h1 id="detailTitle" style="display: inline-block; margin-left: 15px;">Restaurant Name</h1>
                </div>
                <div class="action-group" style="display: flex; gap: 10px;">
                    <button class="btn-success" id="btnApprove"><i class="fa-solid fa-check"></i> Approve</button>
                    <button class="btn-warning" id="btnReject"><i class="fa-solid fa-rotate"></i> Reject (Re-upload)</button>
                    <button class="btn-danger" id="btnSuspend"><i class="fa-solid fa-ban"></i> Suspend</button>
                </div>
            </header>

            <div class="inner-tabs">
                <button class="tab-link active" onclick="switchTab(event, 'tab-overview')">📊 Overview</button>
                <button class="tab-link" onclick="switchTab(event, 'tab-docs')">📄 Documents</button>
            </div>

            <div class="tab-content-area">
                <div id="tab-overview" class="tab-content active">
                    <h3>Restaurant Info</h3><br>
                    <p>Phone: <strong id="detailPhone"></strong></p>
                    <p>Address: <strong id="detailAddress"></strong></p><br>
                    <p>Status: <span id="detailStatusBadge" class="badge"></span></p>
                </div>
                
                <div id="tab-docs" class="tab-content">
                    <div class="doc-card">
                        <h3>Verification Documents</h3>
                        <p>Kripya niche click karke document check karein.</p>
                        <button id="viewDocBtn">View Document Link</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const SERVER_URL = 'https://khaanaleaao.onrender.com';
        let allRestaurantsData = [];

        document.addEventListener('DOMContentLoaded', loadRestaurants);

        async function loadRestaurants() {
            let tbody = document.getElementById("restaurantTableBody");
            try {
                const response = await fetch(`${SERVER_URL}/admin/restaurants`);
                const result = await response.json();
                if (result.status === 'success') {
                    allRestaurantsData = result.data;
                    populateTable(allRestaurantsData);
                }
            } catch (error) {
                tbody.innerHTML = '<tr><td colspan="5" style="text-align:center; color:red;">Connection Error</td></tr>';
            }
        }

        function populateTable(restaurants) {
            let tbody = document.getElementById("restaurantTableBody");
            tbody.innerHTML = ""; 
            restaurants.forEach((rest, index) => {
                tbody.innerHTML += `
                    <tr>
                        <td><strong>${rest.restaurant_name || 'N/A'}</strong><br><small>${rest.address || ''}</small></td>
                        <td>${rest.phone}</td>
                        <td>${rest.document_url ? `<a href="${rest.document_url}" target="_blank" class="badge docs-ok">View</a>` : `<span class="badge incomplete">Missing</span>`}</td>
                        <td><span class="badge ${rest.status}">${rest.status}</span></td>
                        <td><button class="action-btn" onclick="openDetails(${index})">Manage</button></td>
                    </tr>
                `;
            });
        }

        function openDetails(index) {
            let rest = allRestaurantsData[index];
            document.getElementById('listView').style.display = 'none';
            document.getElementById('detailsView').style.display = 'block';

            document.getElementById('detailTitle').innerText = rest.restaurant_name || 'Profile';
            document.getElementById('detailPhone').innerText = rest.phone;
            document.getElementById('detailAddress').innerText = rest.address || 'Not Provided';
            
            let badge = document.getElementById('detailStatusBadge');
            badge.className = `badge ${rest.status}`;
            badge.innerText = rest.status;

            document.getElementById('viewDocBtn').onclick = () => {
                if(rest.document_url) window.open(rest.document_url, '_blank');
                else alert("Document link not found!");
            };

            // Buttons Logic
            document.getElementById('btnApprove').onclick = () => updateStatus(rest.phone, 'active');
            document.getElementById('btnReject').onclick = () => updateStatus(rest.phone, 'incomplete'); 
            document.getElementById('btnSuspend').onclick = () => updateStatus(rest.phone, 'suspended');
        }

        async function updateStatus(phone, newStatus) {
            if(!confirm(`Kya aap status ko "${newStatus}" karna chahte hain?`)) return;

            try {
                const response = await fetch(`${SERVER_URL}/admin/approve-restaurant`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ phone: phone, status: newStatus })
                });
                const result = await response.json();
                if(result.status === 'success') {
                    alert("Status successfully updated to " + newStatus);
                    closeDetails();
                } else {
                    alert("Error: " + result.message);
                }
            } catch (error) {
                alert("Server Error!");
            }
        }

        function closeDetails() {
            document.getElementById('detailsView').style.display = 'none';
            document.getElementById('listView').style.display = 'block';
            loadRestaurants();
        }

        function switchTab(event, tabId) {
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            document.querySelectorAll('.tab-link').forEach(l => l.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
            event.currentTarget.classList.add('active');
        }
    </script>
</body>
</html>
